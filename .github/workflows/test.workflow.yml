name: DepthAI Core HIL Testing

on:
  workflow_dispatch:
    inputs:
      dcl_mode:
        description: "DCL mode for HIL jobs"
        required: false
        default: "OFF"
        type: choice
        options:
          - OFF
          - ON_START
          - CONTINUOUS
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
    types: [opened, reopened, labeled]

# Only allow latest run on same branch to be tested
concurrency:
  group: ci-tests-${{ github.ref }}-1
  cancel-in-progress: true

jobs:

  # The precheck job determines whether a workflow should be run in full
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      dcl_mode: ${{ steps.check.outputs.dcl_mode }}
    steps:
    - name: Evaluate trigger condition
      id: check
      run: |
        EVENT_NAME="${{ github.event_name }}"
        DCL_MODE="${{ github.event.inputs.dcl_mode || 'OFF' }}"

        RAW_LABELS='${{ toJson(github.event.pull_request.labels) }}'
        if [[ "$RAW_LABELS" == "null" || -z "$RAW_LABELS" ]]; then
          LABELS="[]"
        else
          LABELS="$RAW_LABELS"
        fi

        SHOULD_RUN="true"
        if [[ "$EVENT_NAME" == "pull_request" ]]; then
          if ! echo "$LABELS" | jq -r '.[].name' | grep -q "testable"; then
            SHOULD_RUN="false"
          fi
          if echo "$LABELS" | jq -r '.[].name' | grep -q "testable_with_dcl"; then
            DCL_MODE="ON_START"
          fi
        fi

        echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
        echo "dcl_mode=$DCL_MODE" >> "$GITHUB_OUTPUT"

  run_vanilla_tests:
    needs: [precheck]
    if: needs.precheck.outputs.should_run == 'true'
    uses: ./.github/workflows/test_child.yml
    with:
      flavor: "vanilla"
      dcl_mode: ${{ needs.precheck.outputs.dcl_mode }}
      luxonis_os_versions_to_test: "['1.14.1','1.20.5','1.27.1']"
      luxonis_os_versions_to_test_rgb: "['1.27.1']"
      luxonis_os_versions_to_test_usb: "['1.27.1']"
    secrets:
      CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      HIL_PAT_TOKEN: ${{ secrets.HIL_PAT_TOKEN }}

  run_tsan_tests:
    needs: [precheck]
    if: needs.precheck.outputs.should_run == 'true'
    uses: ./.github/workflows/test_child.yml
    with:
      flavor: "tsan"
      dcl_mode: ${{ needs.precheck.outputs.dcl_mode }}
      luxonis_os_versions_to_test: "['1.27.1']"
    secrets:
      CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      HIL_PAT_TOKEN: ${{ secrets.HIL_PAT_TOKEN }}

  run_asan-ubsan_tests:
    needs: [precheck]
    if: needs.precheck.outputs.should_run == 'true'
    uses: ./.github/workflows/test_child.yml
    with:
      flavor: "asan-ubsan"
      dcl_mode: ${{ needs.precheck.outputs.dcl_mode }}
      luxonis_os_versions_to_test: "['1.27.1']"
    secrets:
      CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      HIL_PAT_TOKEN: ${{ secrets.HIL_PAT_TOKEN }}

  run_windows_tests:
    needs: [precheck]
    if: needs.precheck.outputs.should_run == 'true'
    uses: ./.github/workflows/test_child_windows.yml
    with:
      luxonis_os_versions_to_test: "['1.27.1']"
      luxonis_os_versions_to_test_usb: ${{ github.event_name != 'pull_request' && '["1.27.1"]' || '[]' }}
    secrets:
      CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      HIL_PAT_TOKEN: ${{ secrets.HIL_PAT_TOKEN }}

  run_vanilla_mac_tests:
    needs: [precheck]
    if: needs.precheck.outputs.should_run == 'true'
    uses: ./.github/workflows/test_child_mac.yml
    with:
      flavor: "vanilla"
      luxonis_os_versions_to_test: "['1.27.1']"
      luxonis_os_versions_to_test_usb: ${{ github.event_name != 'pull_request' && '["1.27.1"]' || '[]' }}
    secrets:
      HIL_PAT_TOKEN: ${{ secrets.HIL_PAT_TOKEN }}
