name: Run hil tests for specific santizier
on:
  workflow_call:
    inputs:
      flavor:
        required: true
        type: string
      luxonis_os_versions_to_test:
        required: true
        type: string
      luxonis_os_versions_to_test_rgb:
        required: false
        type: string
        default: "[]"
    secrets:
      CONTAINER_REGISTRY:
        required: true
      HIL_PAT_TOKEN:
        required: true

jobs:
 build_docker_container:
    runs-on: ['self-hosted', 'hil-test-v3']
    outputs:
        tag: ${{ steps.build_and_push.outputs.tag }}
    steps:
    - uses: actions/checkout@v3
    - name: Build and push
      id: build_and_push
      env:
        CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      run: |
        BRANCH_NAME="${{ github.ref_name }}"
        PULL_REQUEST="false"
        if [[ -n "${{ github.head_ref }}" ]]; then
         BRANCH_NAME="${{ github.ref }}"
         PULL_REQUEST="true"
        fi
        if [ "$PULL_REQUEST" = "true" ]; then
          TAG="${{ inputs.flavor }}_short_${{ github.sha }}"
        else
          TAG="${{ inputs.flavor }}_${{ github.sha }}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using branch: $BRANCH_NAME"
        scripts/hil/build_and_push.sh "${{ inputs.flavor }}" "$BRANCH_NAME" "$CONTAINER_REGISTRY" "${{ github.sha }}" "$PARALLEL_JOBS" "$PULL_REQUEST" "$TAG"

 linux_rvc2_test:
    needs: [build_docker_container]
    runs-on: ['self-hosted', 'testbed-runner']
    steps:
    - uses: actions/checkout@v3

    - name: Run RVC2 tests
      run: |
        source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
        export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc2-${{ inputs.flavor }}"
        set -o pipefail
        hil_runner --capabilities depthai-core-hil --platforms 'rvc2 and rvc2' --reservation-name $RESERVATION_NAME --wait --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc2" 2>&1 | tee rvc2_test_output.log

    - name: Upload test log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ctest-log-linux_rvc2_test
        path: rvc2_test_output.log
        if-no-files-found: warn

  # Testing
 linux_rvc4_test:
      needs: [build_docker_container]
      strategy:
        matrix:
          rvc4os: ${{ fromJson(inputs.luxonis_os_versions_to_test) }}
        fail-fast: false
      runs-on: ['self-hosted', 'testbed-runner']
      steps:
      - uses: actions/checkout@v3

      - name: Run RVC4 tests
        run: |
          source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
          export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc4-${{ matrix.rvc4os }}-${{ inputs.flavor }}"
          set -o pipefail
          hil_runner --models "oak4_pro or oak4_d" --reservation-name $RESERVATION_NAME --wait --rvc4-os-version ${{ matrix.rvc4os }} --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc4" 2>&1 | tee rvc4_test_output.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log-linux_rvc4_test-rvc4os=${{ matrix.rvc4os }}
          path: rvc4_test_output.log
          if-no-files-found: warn

 linux_rvc4_rgb_test:
      needs: [build_docker_container]
      strategy:
        matrix:
          rvc4os: ${{ fromJson(inputs.luxonis_os_versions_to_test_rgb) }}
        fail-fast: false
      runs-on: ['self-hosted', 'testbed-runner']
      steps:
      - uses: actions/checkout@v3

      - name: Run RVC4 tests
        run: |
          source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
          export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc4-${{ matrix.rvc4os }}-${{ inputs.flavor }}-rgb"
          set -o pipefail
          hil_runner --models "oak4_s" --reservation-name $RESERVATION_NAME --wait --rvc4-os-version ${{ matrix.rvc4os }} --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc4rgb" 2>&1 | tee rvc4_rgb_test_output.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log-linux_rvc4_rgb_test-rvc4os=${{ matrix.rvc4os }}
          path: rvc4_rgb_test_output.log
          if-no-files-found: warn

 aggregate_test_summary:
    needs: [linux_rvc2_test, linux_rvc4_test, linux_rvc4_rgb_test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Download test logs
      uses: actions/download-artifact@v4
      with:
        path: ctest-logs
    - name: Generate combined summary
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if ! command -v python3 >/dev/null 2>&1; then
          echo "python3 not available, skipping test summary." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        log_map_path="ctest-logs/artifact_urls.json"
        if [ -n "${GITHUB_TOKEN:-}" ]; then
          LOG_MAP_PATH="$log_map_path" python3 - <<'PY'
        import json
        import os
        import urllib.request

        api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
        server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
        repo = os.environ.get("GITHUB_REPOSITORY")
        run_id = os.environ.get("GITHUB_RUN_ID")
        token = os.environ.get("GITHUB_TOKEN")
        log_map_path = os.environ.get("LOG_MAP_PATH", "ctest-logs/artifact_urls.json")

        if repo and run_id and token:
            url = f"{api_url}/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100"
            req = urllib.request.Request(
                url,
                headers={
                    "Authorization": f"Bearer {token}",
                    "Accept": "application/vnd.github+json",
                },
            )
            try:
                with urllib.request.urlopen(req) as resp:
                    data = json.load(resp)
            except Exception:
                data = {}

            mapping = {}
            for artifact in data.get("artifacts", []):
                name = artifact.get("name")
                artifact_id = artifact.get("id")
                if not name or not artifact_id:
                    continue
                mapping[name] = f"{server_url}/{repo}/actions/runs/{run_id}/artifacts/{artifact_id}"

            if mapping:
                os.makedirs(os.path.dirname(log_map_path), exist_ok=True)
                with open(log_map_path, "w", encoding="utf-8") as handle:
                    json.dump(mapping, handle)
        PY
        fi

        shopt -s nullglob
        found_logs=0
        for dir in ctest-logs/ctest-log-*; do
          [ -d "$dir" ] || continue
          log_files=("$dir"/*.log)
          [ ${#log_files[@]} -gt 0 ] || continue
          found_logs=1
          context="$(basename "$dir")"
          context="${context#ctest-log-}"
          python3 scripts/ci/ctest_summary.py "${log_files[0]}" "$context" --log-map "$log_map_path" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        done

        if [ "$found_logs" -eq 0 ]; then
          echo "No test logs found to summarize." >> "$GITHUB_STEP_SUMMARY"
        fi

