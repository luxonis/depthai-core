name: Run hil tests for specific santizier
on:
  workflow_call:
    inputs:
      flavor:
        required: true
        type: string
      luxonis_os_versions_to_test:
        required: true
        type: string
      luxonis_os_versions_to_test_rgb:
        required: false
        type: string
        default: "[]"
    secrets:
      CONTAINER_REGISTRY:
        required: true
      HIL_PAT_TOKEN:
        required: true

jobs:
 build_docker_container:
    runs-on: ['self-hosted', 'hil-test-v3']
    outputs:
        tag: ${{ steps.build_and_push.outputs.tag }}
    steps:
    - uses: actions/checkout@v3
    - name: Build and push
      id: build_and_push
      env:
        CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      run: |
        BRANCH_NAME="${{ github.ref_name }}"
        PULL_REQUEST="false"
        if [[ -n "${{ github.head_ref }}" ]]; then
         BRANCH_NAME="${{ github.ref }}"
         PULL_REQUEST="true"
        fi
        if [ "$PULL_REQUEST" = "true" ]; then
          TAG="${{ inputs.flavor }}_short_${{ github.sha }}"
        else
          TAG="${{ inputs.flavor }}_${{ github.sha }}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using branch: $BRANCH_NAME"
        scripts/hil/build_and_push.sh "${{ inputs.flavor }}" "$BRANCH_NAME" "$CONTAINER_REGISTRY" "${{ github.sha }}" "$PARALLEL_JOBS" "$PULL_REQUEST" "$TAG"

 linux_rvc2_test:
    needs: [build_docker_container]
    runs-on: ['self-hosted', 'testbed-runner']
    steps:
    - uses: actions/checkout@v3

    - name: Run RVC2 tests
      run: |
        source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
        export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc2-${{ inputs.flavor }}"
        set -o pipefail
        hil_runner --capabilities depthai-core-hil --platforms 'rvc2 and rvc2' --reservation-name $RESERVATION_NAME --wait --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc2" 2>&1 | tee rvc2_test_output.log

    - name: Summarize RVC2 tests
      if: always()
      run: |
        echo "## RVC2 Test Summary" >> "$GITHUB_STEP_SUMMARY"
        if [ -f rvc2_test_output.log ]; then
          PASS_LINE=$(grep -m1 -E "[0-9]+% tests passed" rvc2_test_output.log | sed 's/^.*] //' || true)
          if [ -n "$PASS_LINE" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**CTest summary:** $PASS_LINE" >> "$GITHUB_STEP_SUMMARY"
          fi

          FAILED_TESTS=$(awk '
            /The following tests FAILED:/ {found=1; next}
            found {
              line=$0
              sub(/^.*\\] /,"",line)
              if (line ~ /^Tests failed for configuration/ || line ~ /^Some tests failed/ || line ~ /^$/) {exit}
              print line
            }
          ' rvc2_test_output.log)

          if [ -z "$FAILED_TESTS" ]; then
            FAILED_TESTS=$(grep -E "Test[[:space:]]*#.*\\*\\*\\*Failed" rvc2_test_output.log | sed 's/^.*] //' | sed 's/^[0-9]\+\/[0-9]\+[[:space:]]*//' || true)
          fi

          if [ -n "$FAILED_TESTS" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failed tests" >> "$GITHUB_STEP_SUMMARY"
            echo "| Test |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|" >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILED_TESTS" | head -n 50 | sed 's/|/\\|/g' | while read -r line; do
              echo "| $line |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            FAIL_LINES=$( { grep -E "FAILED|ERROR|AssertionError" rvc2_test_output.log || true; } | wc -l | tr -d ' ')
            if [ "$FAIL_LINES" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Detected $FAIL_LINES failure-related lines (showing up to 50)." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Log Line |" >> "$GITHUB_STEP_SUMMARY"
              echo "|----------|" >> "$GITHUB_STEP_SUMMARY"
              grep -E "FAILED|ERROR|AssertionError" rvc2_test_output.log | head -n 50 | sed 's/|/\\|/g' | while read -r line; do
                echo "| $line |" >> "$GITHUB_STEP_SUMMARY"
              done
            else
              echo "✅ All tests passed (no failure patterns detected)." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
        else
          echo "Test log not found; unable to summarize failures." >> "$GITHUB_STEP_SUMMARY"
        fi

  # Testing
 linux_rvc4_test:
      needs: [build_docker_container]
      strategy:
        matrix:
          rvc4os: ${{ fromJson(inputs.luxonis_os_versions_to_test) }}
        fail-fast: false
      runs-on: ['self-hosted', 'testbed-runner']
