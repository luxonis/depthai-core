          set -o pipefail
          hil_runner --models "oak4_pro or oak4_d" --reservation-name $RESERVATION_NAME --wait --rvc4-os-version ${{ matrix.rvc4os }} --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc4" 2>&1 | tee rvc4_test_output.log

      - name: Summarize RVC4 tests
        if: always()
        run: |
          SUMMARY_FILE="summary_rvc4_${{ matrix.rvc4os }}.md"
          echo "## RVC4 Test Summary (OS: ${{ matrix.rvc4os }})" >> "$SUMMARY_FILE"
          if [ -f rvc4_test_output.log ]; then
            PASS_LINE=$(grep -m1 -E "[0-9]+% tests passed" rvc4_test_output.log | sed 's/^.*] //' || true)
            if [ -n "$PASS_LINE" ]; then
              echo "" >> "$SUMMARY_FILE"
              echo "**CTest summary:** $PASS_LINE" >> "$SUMMARY_FILE"
            fi

            FAILED_TESTS=$(grep -E "\\] [0-9]+ - .* \\(Failed\\)$" rvc4_test_output.log | awk '
              {
                line=$0
                config=""
                if (match(line, /\\[[^]]+\\]/)) {
                  config=substr(line, RSTART+1, RLENGTH-2)
                }
                sub(/^.*\\] /,"",line)
                sub(/ *\\(Failed\\)$/, "", line)
                if (config != "") {
                  print config " :: " line
                } else {
                  print line
                }
              }
            ' || true)

            if [ -z "$FAILED_TESTS" ]; then
              FAILED_TESTS=$(awk '
                /The following tests FAILED:/ {found=1; next}
                found {
                  line=$0
                  sub(/^.*\\] /,"",line)
                  if (line ~ /^Tests failed for configuration/ || line ~ /^Some tests failed/ || line ~ /^$/) {exit}
                  print line
                }
              ' rvc4_test_output.log)
            fi

            if [ -z "$FAILED_TESTS" ]; then
              FAILED_TESTS=$(grep -E "Test[[:space:]]*#.*\\*\\*\\*Failed" rvc4_test_output.log | sed 's/^.*] //' | sed 's/^[0-9]\+\/[0-9]\+[[:space:]]*//' || true)
            fi

            if [ -n "$FAILED_TESTS" ]; then
              echo "" >> "$SUMMARY_FILE"
              echo "### Failed tests" >> "$SUMMARY_FILE"
              echo "| Test |" >> "$SUMMARY_FILE"
              echo "|------|" >> "$SUMMARY_FILE"
              echo "$FAILED_TESTS" | head -n 50 | sed 's/|/\\|/g' | while read -r line; do
                echo "| $line |" >> "$SUMMARY_FILE"
              done
            else
              FAIL_LINES=$( { grep -E "FAILED|ERROR|AssertionError" rvc4_test_output.log || true; } | wc -l | tr -d ' ')
              if [ "$FAIL_LINES" -gt 0 ]; then
                echo "" >> "$SUMMARY_FILE"
                echo "Detected $FAIL_LINES failure-related lines (showing up to 50)." >> "$SUMMARY_FILE"
                echo "" >> "$SUMMARY_FILE"
                echo "| Log Line |" >> "$SUMMARY_FILE"
                echo "|----------|" >> "$SUMMARY_FILE"
                grep -E "FAILED|ERROR|AssertionError" rvc4_test_output.log | head -n 50 | sed 's/|/\\|/g' | while read -r line; do
                  echo "| $line |" >> "$SUMMARY_FILE"
                done
              else
                echo "✅ All tests passed (no failure patterns detected)." >> "$SUMMARY_FILE"
              fi
            fi
          else
            echo "Test log not found; unable to summarize failures." >> "$SUMMARY_FILE"
          fi

      - name: Upload RVC4 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-rvc4-${{ matrix.rvc4os }}
          path: summary_rvc4_${{ matrix.rvc4os }}.md
          if-no-files-found: warn

