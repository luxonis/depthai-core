 aggregate_test_summaries:
    needs: [linux_rvc2_test, linux_rvc4_test, linux_rvc4_rgb_test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Download test summaries
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        pattern: test-summary-*
        path: summaries
        merge-multiple: true

    - name: Publish combined summary
      run: |
        echo "## HIL Test Summary" >> "$GITHUB_STEP_SUMMARY"
        shopt -s nullglob
        files=(summaries/*.md)
        if [ ${#files[@]} -gt 0 ]; then
          for f in "${files[@]}"; do
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
          done
        else
          echo "No test summaries found." >> "$GITHUB_STEP_SUMMARY"
        fi

