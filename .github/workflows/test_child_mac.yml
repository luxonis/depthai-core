name: Run hil tests for mac os
on:
  workflow_call:
    inputs:
      flavor:
        required: true
        type: string
        default: "vanilla"
      luxonis_os_versions_to_test:
        required: true
        type: string
      luxonis_os_versions_to_test_usb:
        required: false
        type: string
        default: "[]"
    secrets:
      HIL_PAT_TOKEN:
        required: true

jobs:
#  mac_rvc2_test:
#     needs: [build_docker_container]
#     runs-on: ['self-hosted', 'testbed-runner']
#     steps:
#     - uses: actions/checkout@v3

#     - name: Run RVC2 tests
#       run: |
#         source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
#         export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc2-${{ inputs.flavor }}"
#         exec hil_runner --capabilities depthai-core-hil --platforms 'rvc2 and rvc2' --reservation-name $RESERVATION_NAME --wait --docker-image ${{ secrets.CONTAINER_REGISTRY }}/depthai-core-hil:${{ needs.build_docker_container.outputs.tag }} --commands "./tests/run_tests_entrypoint.sh rvc2"

  # Testing
 mac_rvc4_test:
      strategy:
        matrix:
          rvc4os: ${{ fromJson(inputs.luxonis_os_versions_to_test) }}
        fail-fast: false
      runs-on: ['self-hosted', 'testbed-runner']
      steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
            fetch-depth: 0

      - name: Run RVC4 tests
        run: |
            set -o pipefail
            BRANCH_NAME="${{ github.ref_name }}"
            PULL_REQUEST="false"
            if [[ -n "${{ github.head_ref }}" ]]; then
                BRANCH_NAME="${{ github.ref }}"
                PULL_REQUEST="true"
            fi
            source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
            export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc4-mac-${{ matrix.rvc4os }}-${{ inputs.flavor }}"
            exec hil_runner --models "oak4_pro or oak4_d" -os mac --sync-workspace --rsync-args="--exclude=venv" --reservation-name $RESERVATION_NAME --wait --rvc4-os-version ${{ matrix.rvc4os }} --commands "cd /tmp/depthai-core && ./scripts/hil/run_hil_tests_mac.sh $PULL_REQUEST ${{ inputs.flavor }} --rvc4" 2>&1 | tee mac_rvc4_test_output.log
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log-mac-rvc4_test-rvc4os=${{ matrix.rvc4os }}
          path: mac_rvc4_test_output.log
          if-no-files-found: warn

 mac_rvc4_test_usb:
      strategy:
        matrix:
          rvc4os: ${{ fromJson(inputs.luxonis_os_versions_to_test_usb) }}
        fail-fast: false
      runs-on: ['self-hosted', 'testbed-runner']
      steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
            fetch-depth: 0

      - name: Run RVC4 tests
        run: |
            set -o pipefail
            BRANCH_NAME="${{ github.ref_name }}"
            PULL_REQUEST="false"
            if [[ -n "${{ github.head_ref }}" ]]; then
                BRANCH_NAME="${{ github.ref }}"
                PULL_REQUEST="true"
            fi
            source scripts/hil/prepare_hil_framework.sh ${{ secrets.HIL_PAT_TOKEN }}
            export RESERVATION_NAME="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID#rvc4-mac-${{ matrix.rvc4os }}-usb"
            exec hil_runner --models "oak4_pro or oak4_d" -os mac --sync-workspace --rsync-args="--exclude=venv" --reservation-name $RESERVATION_NAME --wait --rvc4-os-version ${{ matrix.rvc4os }} --commands "cd /tmp/depthai-core && ./scripts/hil/run_hil_tests_mac.sh $PULL_REQUEST ${{ inputs.flavor }} --rvc4usb" 2>&1 | tee mac_rvc4_usb_test_output.log
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log-mac-rvc4_usb_test-rvc4os=${{ matrix.rvc4os }}
          path: mac_rvc4_usb_test_output.log
          if-no-files-found: warn

 report_mac_test_results:
    name: Report mac test results
    needs: [mac_rvc4_test_usb, mac_rvc4_test]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v3
    - name: Download test logs
      uses: actions/download-artifact@v4
      with:
        pattern: ctest-log-mac-*
        path: ctest-logs
    - name: Generate combined summary
      run: |
        if ! command -v python3 >/dev/null 2>&1; then
          echo "python3 not available, skipping test summary." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        shopt -s nullglob
        found_logs=0
        first_summary=1
        mkdir -p ctest-reports
        artifact_prefix="ctest-log-mac-"
        for dir in ctest-logs/${artifact_prefix}*; do
          [ -d "$dir" ] || continue
          log_files=("$dir"/*.log)
          [ ${#log_files[@]} -gt 0 ] || continue
          found_logs=1
          context="$(basename "$dir")"
          context="${context#${artifact_prefix}}"
          if [ "$first_summary" -eq 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          first_summary=0
          python3 scripts/ci/ctest_summary.py "${log_files[0]}" "$context" >> "$GITHUB_STEP_SUMMARY"
          report_context="${context//\//_}"
          report_context="${report_context// /_}"
          python3 scripts/ci/ctest_to_junit.py "${log_files[0]}" "ctest-reports/${report_context}.xml" "$context"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        done

        if [ "$found_logs" -eq 0 ]; then
          echo "No test logs found to summarize." >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload JUnit XML reports
      if: always() && hashFiles('ctest-reports/*.xml') != ''
      uses: actions/upload-artifact@v4
      with:
        name: junit-reports-mac
        path: ctest-reports/*.xml
        if-no-files-found: warn
